<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Radio Club Lugones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Theme base (puedes cambiar a theme-simple-dark si quieres) -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- Estilos estilo "revista" -->
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
  <div id="app"></div>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <script>
    mermaid.initialize({ startOnLoad: false });
    let landingNavBound = false;

    function isHomeRoute() {
      const h = window.location.hash || "";
      return h === "" || h === "#" || h === "#/" || h === "#/!";
    }

    function updateLandingNavVisibility() {
      const nav = document.querySelector(".app-nav");
      if (!nav) return;
      const cover = document.querySelector("section.cover.show");
      const content = document.querySelector(".content");
      let show = false;

      if (cover && isHomeRoute()) {
        const scrollTop = content ? content.scrollTop : window.scrollY;
        const threshold = Math.max(120, cover.clientHeight * 0.55);
        show = scrollTop < threshold;
      }

      nav.style.display = show ? "" : "none";
    }

    function bindLandingNavVisibility() {
      if (landingNavBound) return;
      window.addEventListener("hashchange", updateLandingNavVisibility);
      window.addEventListener("resize", updateLandingNavVisibility);
      window.addEventListener("scroll", updateLandingNavVisibility, { passive: true });
      document.addEventListener("scroll", updateLandingNavVisibility, { passive: true, capture: true });
      landingNavBound = true;
    }

    // Mini "CMS" estático: renderiza la home leyendo posts.json
    async function renderHomePosts() {
      const container = document.getElementById('latest-posts');
      if (!container) return;

      try {
        const res = await fetch('posts.json', { cache: 'no-store' });
        const posts = await res.json();

        container.innerHTML = posts.map(p => `
          <article class="post-card">
            <a class="post-link" href="${p.path}">
              <img class="post-cover" src="${p.cover}" alt="${p.title}">
              <div class="post-info">
                <span class="post-category">${p.category}</span>
                <h3 class="post-title">${p.title}</h3>
                <div class="post-meta">${p.date} · ${p.author}</div>
              </div>
            </a>
          </article>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p class="post-error">No se pudieron cargar las entradas. Revisa posts.json.</p>';
      }
    }

    window.$docsify = {
      name: "Radio Club Lugones",
      repo: "",
      homepage: "ultimas-noticias.md",
      loadNavbar: true,
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      subMaxLevel: 2,

      // Render Mermaid blocks: ```mermaid
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "mermaid") {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },

      plugins: [
        function(hook) {
          // Después de renderizar cada página
          hook.doneEach(function() {
            // Mermaid
            try { mermaid.run({ querySelector: ".mermaid" }); } catch (e) {}

            // Home cards (README): no uses <script> en el MD, Docsify lo filtra.
            // En su lugar, detectamos el contenedor y lo rellenamos aquí.
            renderHomePosts();

            // Navbar superior solo en landing visible
            bindLandingNavVisibility();
            updateLandingNavVisibility();
            setTimeout(updateLandingNavVisibility, 0);
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
